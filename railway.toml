[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/health/live"
healthcheckTimeout = 120
preDeployCommand = "alembic upgrade head && python -c 'import asyncio; from health_ally.persistence.db import run_bootstrap; from health_ally.settings import Settings; asyncio.run(run_bootstrap(Settings()))'"
startCommand = "python -m health_ally"
